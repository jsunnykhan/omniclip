version: '3.8'

services:
  server:
    build:
      context: ./omniclip-server
      dockerfile: Dockerfile
    ports:
      - "6030:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:password@db:5432/omniclip}
    restart: unless-stopped
    depends_on:
      - db

  web:
    build:
      context: ./omniclip-web
      dockerfile: Dockerfile
    ports:
      - "6010:3000"
    environment:
      - NODE_ENV=production
      # Next.js environment variables here (must start with NEXT_PUBLIC_ for client)
      - NEXT_PUBLIC_API_URL=http://localhost:6030
    restart: unless-stopped


  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: omniclip
    ports:
      - "6040:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
