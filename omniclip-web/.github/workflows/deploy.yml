name: Deploy OmniClip Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: omniclip-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: omniclip-web

      - name: Build Next.js
        run: npm run build
        working-directory: omniclip-web
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT_FOR_RELEASES }}
          GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO }}
          NEXT_PUBLIC_APP_URL: https://omniclip.app

      # Note: Actual deployment steps (Vercel, AWS, etc.) would go here.
      # For now, this ensures the private GITHUB_PAT is used only during build/runtime securely.
