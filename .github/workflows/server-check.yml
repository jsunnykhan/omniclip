name: Server CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'omniclip-server/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'omniclip-server/**'

env:
  CARGO_TERM_COLOR: always
  # This avoids the SQLX_OFFLINE compilation error on CI
  SQLX_OFFLINE: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./omniclip-server

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Setup Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "./omniclip-server -> target"

    - name: Check Formatting
      run: cargo fmt -- --check

    - name: Run Clippy Linter
      run: cargo clippy -- -D warnings

    - name: Run Tests
      # If your tests require a database, you would use a service container here
      run: cargo test --verbose
      env:
        # In a real deployed environment, you would map GitHub Secrets here.
        # Ensure you NEVER commit .env with real secrets to the repo.
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
